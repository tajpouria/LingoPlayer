name: Generate Audio

on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC every night
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (list what would be generated, no piper/S3 writes)"
        type: boolean
        default: false
      user:
        description: "Process only this user folder (leave blank for all users)"
        type: string
        default: ""
      workers:
        description: "Parallel synthesis workers (default: 4)"
        type: string
        default: "4"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install piper binary
        run: |
          PIPER_VERSION="2023.11.14-2"
          curl -fsSL "https://github.com/rhasspy/piper/releases/download/${PIPER_VERSION}/piper_linux_x86_64.tar.gz" \
            | tar -xz -C /usr/local/bin --strip-components=1 piper/piper
          piper --version

      - name: Run generate_audio.py (scheduled)
        if: github.event_name == 'schedule'
        env:
          S3_BUCKET:            ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY_ID:     ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_REGION:            ${{ vars.S3_REGION }}
          S3_PATH_PREFIX:       ${{ vars.S3_PATH_PREFIX }}
          PIPER_BIN:            piper
          PIPER_MODELS_DIR:     .models
        run: python generate_audio.py --workers 4

      - name: Run generate_audio.py (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          S3_BUCKET:            ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY_ID:     ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_REGION:            ${{ vars.S3_REGION }}
          S3_PATH_PREFIX:       ${{ vars.S3_PATH_PREFIX }}
          PIPER_BIN:            piper
          PIPER_MODELS_DIR:     .models
        run: |
          ARGS="--workers ${{ github.event.inputs.workers }}"
          [ "${{ github.event.inputs.dry_run }}"  = "true" ] && ARGS="$ARGS --dry-run"
          [ -n "${{ github.event.inputs.user }}" ]           && ARGS="$ARGS --user ${{ github.event.inputs.user }}"
          echo "Running: python generate_audio.py $ARGS"
          python generate_audio.py $ARGS

      - name: Cache downloaded voice models
        uses: actions/cache@v4
        with:
          path: .models
          key: piper-models-${{ hashFiles('generate_audio.py') }}
          restore-keys: piper-models-
